name: verify

on:
  push:
    branches:
      - main
    paths:
      - 'library/**'
      - 'verify/**'

  pull_request:
    paths:
      - 'library/**'
      - 'verify/**'


jobs:
  verify:
    runs-on: ubuntu-latest
      
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install setuptools
          python -m pip install online-judge-tools online-judge-verify-helper

      - name: Run tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          YUKICODER_TOKEN: ${{ secrets.YUKICODER_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: oj-verify run
